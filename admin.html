<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Webnestic</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  padding:15px;
}

h1{
  text-align:center;
  color:#ff9800;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid #444;
  padding:10px;
  text-align:center;
}

th{
  background:#ff9800;
  color:black;
}

input,button{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px
}

button{
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer
}

button:hover{background:#16a34a}

.preview{margin-top:10px}
img{max-width:100%;border-radius:10px}
</style>
</head>

<body>
<h2>🎓 Demo Students</h2>
<table id="demoTable">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Course</th>
<th>Date</th>
</tr>
</table>
<h1>📊 Student Admin Panel</h1>

<table>
<thead>
<tr>
<th>Name</th>
<th>Father</th>
<th>Phone</th>
<th>Email</th>
<th>Gender</th>
<th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<div class="container">
<h2>🚀 Ultimate Auto Share Tool</h2>

<input type="text" id="title" placeholder="Enter Title">
<input type="text" id="link" placeholder="Enter Website Link">

<div class="preview">
  <img id="imgPreview" src="postor.png">
</div>

<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="shareFacebook()">Facebook</button>
<button onclick="shareTelegram()">Telegram</button>
<button onclick="copyText()">Copy Text</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAt3aALQCVTRTO2ep9Iw74ZJZHcjAktnf8",
  authDomain: "vending-machine-1.firebaseapp.com",
  projectId: "vending-machine-1",
  storageBucket: "vending-machine-1.firebasestorage.app",
  messagingSenderId: "107783314578",
  appId: "1:107783314578:web:2bf790544d921c996bda4b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("data");
async function loadDemo(){
  const querySnapshot = await getDocs(collection(db,"demo_students"));
  let table = document.getElementById("demoTable");

  querySnapshot.forEach(doc=>{
    let d = doc.data();
    let row = `<tr>
      <td>${d.name}</td>
      <td>${d.phone}</td>
      <td>${d.email}</td>
      <td>${d.course}</td>
      <td>${new Date(d.date.seconds*1000).toLocaleString()}</td>
    </tr>`;
    table.innerHTML += row;
  });
}
// LOAD DATA
async function loadData(){
  table.innerHTML = "";

  const querySnapshot = await getDocs(collection(db,"students"));

  querySnapshot.forEach((docSnap)=>{
    const d = docSnap.data();

    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.father}</td>
        <td>${d.phone}</td>
        <td>${d.email}</td>
        <td>${d.gender}</td>
        <td>
          <button onclick="deleteStudent('${docSnap.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

// 🔥 GLOBAL FUNCTIONS (IMPORTANT FIX)
window.getText = function(){
  let t = document.getElementById('title').value;
  let l = document.getElementById('link').value;
  let img = document.getElementById('imgPreview').src;

  return `*${t}*\n${img}\n${l}`;
}

window.shareWhatsApp = function(){
  let text = encodeURIComponent(window.getText());
  window.open(`https://wa.me/?text=${text}`,'_blank');
}

window.shareFacebook = function(){
  let url = document.getElementById('link').value;
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`,'_blank');
}

window.shareTelegram = function(){
  let text = encodeURIComponent(window.getText());
  let url = document.getElementById('link').value;
  window.open(`https://t.me/share/url?url=${url}&text=${text}`,'_blank');
}

window.copyText = function(){
  let text = window.getText();
  navigator.clipboard.writeText(text);
  alert('Copied!');
}

// DELETE
window.deleteStudent = async function(id){
  if(confirm("Delete this student?")){
    await deleteDoc(doc(db,"students",id));
    loadData();
  }
}

// LOAD ON START
loadData();
loadDemo();
</script>

</body>
</html>
